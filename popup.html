<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body class="p-4">
  <header class="flex items-center justify-between mb-4 pb-3 border-b border-custom">
    <div class="flex items-center gap-2">
      <img src="https://raw.githubusercontent.com/samir-dx/store/refs/heads/main/images/chunks-logo.png" class="logo-icon" alt="logo">
      <h1 class="text-sm font-semibold tracking-tight text-teal-600 dark:text-teal-400">Network Chunks</h1>
    </div>
    <div class="flex items-center gap-1">
      <button id="view-toggle" class="btn-icon" title="View Saved Lists">
        <svg id="view-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
        </svg>
      </button>
      <button id="theme-toggle" class="btn-icon">
        <svg id="theme-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
      </button>
    </div>
  </header>

  <div id="live-view">
    <div id="empty-state" class="hidden">
      <p class="text-zinc-400 text-xs italic w-full text-center py-8">No chunks captured for this origin</p>
    </div>

    <div id="newly-added-container" class="hidden mb-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-[10px] font-bold text-teal-600 dark:text-teal-400 uppercase tracking-wider flex items-center gap-1">
          <span class="w-1.5 h-1.5 rounded-full bg-teal-500 animate-pulse"></span>
          Newly Added (<span id="new-count">0</span>)
        </p>
        <div class="flex gap-1">
          <button id="save-new" class="btn-icon text-teal-600 dark:text-teal-400" title="Save to List">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
          </button>
          <button id="copy-new" class="btn-icon text-teal-600 dark:text-teal-400" title="Copy Newly Added">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          </button>
        </div>
      </div>
      <div class="scroll-container min-h-[60px] max-h-[140px]">
        <div id="new-list" class="flex flex-wrap gap-2"></div>
      </div>
    </div>
    
    <div id="history-container" class="hidden mb-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">
          History (<span id="history-count">0</span>)
        </p>
        <div class="flex gap-1">
          <button id="save-history" class="btn-icon text-zinc-400 hover:text-foreground" title="Save History to List">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
          </button>
          <button id="copy-history" class="btn-icon text-zinc-400 hover:text-foreground" title="Copy History">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          </button>
        </div>
      </div>
      <div class="scroll-container max-h-[140px]">
        <div id="history-list" class="flex flex-wrap gap-2"></div>
      </div>
    </div>
    <div class="flex gap-2 mt-4 pt-3 border-t border-custom">
      <button id="copy" class="btn-primary flex-1">Copy All</button>
      <button id="clear" class="btn-outline flex-1">Clear</button>
    </div>
  </div>

  <div id="saved-view" class="hidden">
    <div class="flex justify-between items-center mb-2">
      <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Saved Manager</p>
    </div>
    <div class="scroll-container" style="height: 270px; max-height: 270px;">
      <div id="saved-list-container" class="flex flex-col gap-3"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
